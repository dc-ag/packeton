tags:
    - name: "Packages"
      description: "Packages info"

x-pkg-param: &pkg-param
    parameters:
        -   name: "name"
            in: "path"
            required: true
            type: "string"

paths:
    '/api/webhook-invoke/{name}':
        post:
            summary: 'Invoke generic webhook'
            example: $Default
            description: |
                External custom webhook. Use query parameter token=user:apitoken for authorization if basic is not supported.
            <<: *pkg-param

    '/api/jobs/{id}':
        get:
            summary: 'Job result'
            parameters:
                -   name: "id"
                    in: "path"
                    required: true
                    type: "string"

    '/api/healthz':
        get:
            summary: 'Health check'

    '/api/update-package':
        post:
            tags: [ Packages ]
            summary: 'Update package webhook by payload'
            description: |
                Update package webhook by payload, see <a href="/about">About</a> <br>
                Use query parameter token=user:apitoken for authorization if basic is not supported.
            example: $Default

    '/api/update-package/{name}':
        get:
            tags: [ Packages ]
            summary: 'Update package hook by name'
            <<: *pkg-param

    '/api/create-package':
        post:
            tags: [ Packages ]
            summary: 'Create a package'
            example: $PackageCreate
    
    '/api/packages':
        get:
            tags: [ Packages ]
            summary: 'List of packages'
            parameters:
                -   name: type
                    description: For example composer-plugin
                    in: query
                -   name: vendor
                    description: For example composer
                    in: query
                -   name: "fields[]"
                    description:  fields - repository, type, versions
                    in: query
                    required: false
                    schema:
                        type: array
                        items:
                            type: string

    '/api/packages/{name}':
        get:
            tags: [ Packages ]
            summary: 'View a package'
            <<: *pkg-param

        put:
            tags: [ Packages ]
            summary: 'Update a package'
            example: $PackageUpdate
            <<: *pkg-param

    '/api/packages/{name}/dependents':
        get:
            tags: [ Packages ]
            summary: 'View the dependents of a package'
            <<: *pkg-param

    '/api/packages/{name}/current-dependents.json':
        get:
            tags: [ Packages ]
            summary: 'View current dependents of a package (latest/current versions only)'
            description: |
                Returns packages that depend on `{name}` in their **highest semVer version**.
                Branch aliases (versions matching `dev-*`, e.g. `dev-master`) are excluded from
                consideration. Among all remaining versions of a dependent package, the one with the
                highest `normalizedVersion` (tie-broken by insertion order) is selected as "current".
                A package is included only if that current version still has the dependency on `{name}`.
                Packages that dropped the dependency in their latest release are excluded.

                **`dependency_type`** is `require` or `require-dev`. When a package appears in both
                `require` and `require-dev` for the same target, it is returned once with
                `dependency_type = require` (require wins).

                **`version_tag`** is an optional substring filter (`LIKE %value%`) applied to the
                version string **before** selecting the highest version. Only versions whose `version`
                string contains the tag are eligible as the "current" version. This allows filtering
                to a specific release line — e.g. `version_tag=1.0` restricts to `1.0.x` versions,
                so a package can appear even if its absolute latest version (e.g. `2.0.0`) does not
                match, as long as the highest matching version still has the dependency.
            parameters:
                -   name: name
                    in: path
                    required: true
                    type: string
                -   name: page
                    in: query
                    required: false
                    type: integer
                    description: Page number (default 1, 15 items per page)
                -   name: version_tag
                    in: query
                    required: false
                    type: string
                    description: Optional substring filter on the dependent package current version string
    
    '/api/packages/{name}/changelog':
        get:
            tags: [ Packages ]
            summary: 'Get Git changelog for package'
            parameters:
                -   name: name
                    in: path
                    required: true
                    type: string
                -   name: from
                    description: From version, example v2.8.0
                    in: query
                -   name: to
                    description: To version, example v2.8.1
                    in: query

examples:
    PackageCreate: |
        {
          "repository": "git@github.com:sonata-project/SonataSeoBundle.git",
          "credentials": 1
        }
    PackageUpdate: |
        {
          "repository": "git@github.com:sonata-project/SonataSeoBundle.git"
        }
